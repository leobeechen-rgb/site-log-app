/* ---------- 共用工具 ---------- */
function HB_b64ToBlob(b64,mime){let bin=atob(b64),bytes=new Uint8Array(bin.length);for(let i=0;i<bin.length;i++)bytes[i]=bin.charCodeAt(i);return new Blob([bytes],{type:mime})}
function HB_downloadBlob(blob,filename){let url=URL.createObjectURL(blob),a=document.createElement("a");a.href=url,a.download=filename,document.body.appendChild(a),a.click(),document.body.removeChild(a),setTimeout(()=>URL.revokeObjectURL(url),4000)}
function HB_esc(v){return String(v??"").replace(/[&<>"']/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"})[c])}
function HB_toROC(dateStr){if(!dateStr)return{y:"",m:"",d:""};let d=new Date(dateStr+"T00:00:00");if(isNaN(d.getTime()))return{y:"",m:"",d:""};return{y:String(d.getFullYear()-1911),m:String(d.getMonth()+1),d:String(d.getDate())}}
function HB_num(v){let n=parseFloat(String(v||"").replace(/,/g,""));return isNaN(n)?0:n}
function HB_money(n){return Math.round(n).toLocaleString("en-US")}
function HB_accountLine(acc){return acc?`\u2756 ${acc.bank_name}｜${acc.account_number}｜${acc.account_holder}`:""}
function HB_toChineseMoney(n){
  n=Math.round(HB_num(n));
  if(n<=0)return"";
  const digits=["零","壹","貳","叁","肆","伍","陸","柒","捌","玖"];
  const units=["","拾","佰","仟"];
  const bigUnits=["","萬","億","兆"];
  let s=String(n),groups=[];
  while(s.length>0){groups.unshift(s.slice(-4));s=s.slice(0,-4)}
  let result="";
  for(let gi=0;gi<groups.length;gi++){
    let g=groups[gi].padStart(4,"0"),gnum=parseInt(g,10),gs="",zeroFlag=false;
    if(gnum>0){
      for(let i=0;i<4;i++){
        let d=parseInt(g[i],10);
        if(d===0){zeroFlag=gs.length>0}
        else{if(zeroFlag){gs+="零";zeroFlag=false}gs+=digits[d]+units[3-i]}
      }
    }
    result+=gs+(gnum>0?bigUnits[groups.length-1-gi]:"")
  }
  result=result.replace(/零+/g,"零").replace(/零$/,"");
  return(result||"")+"元整"
}

async function HB_generateContractDocx(v){
  let zip=await window.JSZip.loadAsync(HB_b64ToBlob(HB_CONTRACT_TPL_B64,HB_DOCX_MIME));
  let xml=await zip.file("word/document.xml").async("string");
  let accs=v.accounts||[];
  let map={
    DESIGN_NAME:v.designName,DESIGN_LOCATION:v.designLocation,
    AREA_PING:v.areaPing,PRICE_PER_PING:v.pricePerPing,TOTAL_PRICE:v.totalPrice,
    PARTY_A_NAME:v.partyAName,PARTY_A_REP:v.partyARep||v.partyAName,
    PARTY_A_ADDRESS:v.partyAAddress,PARTY_A_PHONE:v.partyAPhone,PARTY_A_ID:v.partyAId,
    CONTRACT_YEAR:v.contractYear,CONTRACT_MONTH:v.contractMonth,CONTRACT_DAY:v.contractDay,
    ACCOUNT_LINE_1:HB_accountLine(accs[0]),ACCOUNT_LINE_2:HB_accountLine(accs[1]),ACCOUNT_LINE_3:HB_accountLine(accs[2])
  };
  for(let k in map){
    xml=xml.split("{{"+k+"}}").join(HB_esc(map[k]));
  }
  zip.file("word/document.xml",xml);
  let out=await zip.generateAsync({type:"blob",mimeType:HB_DOCX_MIME});
  HB_downloadBlob(out,(v.designName||"設計合約")+"_赫柏空間設計合約.docx");
}

async function HB_generateEngContractDocx(v){
  let zip=await window.JSZip.loadAsync(HB_b64ToBlob(HB_ENG_CONTRACT_TPL_B64,HB_DOCX_MIME));
  let xml=await zip.file("word/document.xml").async("string");
  let accs=v.accounts||[];
  let stages=(v.paymentStages||[]).slice(0,4);
  let map={
    PARTY_A_NAME:v.partyAName,ENG_NAME:v.engName,ENG_LOCATION:v.engLocation,
    TOTAL_PRICE:HB_money(HB_num(v.totalPrice)),TOTAL_PRICE_WORDS:HB_toChineseMoney(v.totalPrice),
    DURATION_DAYS:v.durationDays||"",
    PARTY_A_ID:v.partyAId,PARTY_A_ADDRESS:v.partyAAddress,PARTY_A_PHONE:v.partyAPhone,

    ACCOUNT_LINE_1:HB_accountLine(accs[0]),ACCOUNT_LINE_2:HB_accountLine(accs[1]),ACCOUNT_LINE_3:HB_accountLine(accs[2])
  };
  for(let i=0;i<4;i++){
    let st=stages[i]||{};
    let amt=st.percent?HB_num(v.totalPrice)*HB_num(st.percent)/100:0;
    map["STAGE"+(i+1)+"_NAME"]=st.name?(st.percent?st.name+" "+st.percent+"%":st.name):"";
    map["STAGE"+(i+1)+"_WORDS"]=amt?HB_toChineseMoney(amt):"";
    map["STAGE"+(i+1)+"_NUM"]=amt?HB_money(amt):"";
    map["STAGE"+(i+1)+"_COND"]=st.condition||"";
  }
  for(let k in map){
    xml=xml.split("{{"+k+"}}").join(HB_esc(map[k]));
  }
  zip.file("word/document.xml",xml);
  let out=await zip.generateAsync({type:"blob",mimeType:HB_DOCX_MIME});
  HB_downloadBlob(out,(v.engName||"工程合約")+"_赫柏空間工程合約.docx");
}

<p>1. 著作權歸屬：除另有書面約定外，由乙方因本合約所完成之所有設計圖說、3D效果圖、圖表及相關著作，其著作財產權與著作人格權均歸乙方（赫柏空間設計）所有。</p>
<p>2. 使用權授權：甲方於付清本合約全額設計費用後，始取得該設計圖說於本合約「設計案地點」之單次合法施工使用權。未經乙方書面同意，甲方不得將該圖說使用於本合約以外之工程地點、轉售或轉讓予任何第三人。</p>
<p>3. 作品發表權：甲方同意乙方得保存本案設計成果以備參考。乙方有權將本案列入客戶名單，並得公開提出本件設計成品、3D效果圖或完工後之實景照片，作為推廣、教學、展示、網頁及社群媒體行銷之用。乙方於發表時應主動隱匿甲方之個人私密資訊（如身分證字號、完整電話等）。</p>

<h2>第七條：修改規範與超次費用</h2>
<p>1. 修改申請期限：乙方於第四條所定各階段交付工作成果後，經甲方審核，甲方得於 7 日內以書面或電子郵件提出修改意見。</p>
<p>2. 修改次數限制：甲方於各階段所提出之修改次數，總計以 3 次為限。</p>
<p>3. 修改幅度標準：大修標準為格局更改、房間位移更動、整體風格重新定位；小修標準為顏色變更、櫃體局部尺寸調整、單一材質替換。</p>
<p>4. 超次修改費用：甲方同意如提出超過本條第 2 項所定之修改次數（第 4 次起），或於確認簽字後反悔要求重畫者，應另行支付變更設計費。費用標準為：每次小修新臺幣 1,000 元整（未稅）；每次大修新臺幣 4,500 元整（未稅）。</p>

<h2>第八條：工程承攬回饋條款</h2>
<p>本合約書中所訂定之設計費用，如甲方後續改以工程承攬方式由乙方負責施工發包與承作，且雙方另行簽訂《工程發包承攬合約》時，乙方同意將部分設計費折抵或回饋予甲方，其折抵方式及金額由雙方另行議定之。</p>

<h2>第九條：監造與差旅費用之排除</h2>
<p>本合約所報價之內容與金額，僅針對「室內設計與圖說繪製」提出，不包含施工期間之進度監管差旅費用，亦不包含現場施工監造費用。若甲方後續需要乙方提供現場監造服務，須由雙方另行議定並簽訂監造或施工合約。</p>

<h2>第十條：契約終止與結算機制</h2>
<p>設計委託因故終止時，以本合約之設計服務費用單價為計價基準，按下列方式結算之：</p>
<p>1. 因可歸責於甲方之事由終止契約時，甲方應結算乙方已完成階段之設計服務費用予乙方，且已支付之款項不予退還。</p>
<p>2. 因不可歸責於乙方之事由（如天災、政策變更等不可抗力）終止契約時，乙方得依已完成之工作進度比例，請領已完成各階段之設計服務費用。</p>

<h2>第十一條：違約處理與惡意拖延</h2>
<p>1. 違約催告：除本合約另有約定外，任一方違反或不履行本合約之任何約定，經他方以書面或電子郵件定 7 日之期限催告，若違約之一方於催告期間屆滿仍未改善者，他方得終止本合約，並請求因此所生之損害賠償。</p>
<p>2. 甲方拖延與刁難之處置：若甲方有惡意刁難、指示不當，或於乙方交付各階段設計提案時起逾一個月，甲方仍未能完成該階段驗收或提出具體修改意見者，乙方得以書面或電子郵件定 3 日之期限催告改善。若期限屆滿仍未改善，乙方得逕行終止合約，並請求因此所生之損害賠償。</p>
<p>3. 終止後之權利與違約金：因不可歸責於乙方之事由而終止合約時，終止前所完成之所有設計著作、圖紙，其著作人及著作財產權均絕對歸乙方所有。甲方並應支付總報酬之 30% 作為懲罰性違約金。</p>
<p>4. 合意終止：甲、乙雙方亦得合意終止本合約，並依雙方共同協議之方案結算應付款項。</p>

<h2>第十二條：通知送達</h2>
<p>1. 本契約雙方所為之通知辦理事項，以書面通知時，均依本契約所載之地址為準。</p>
<p>2. 任何一方遇有地址變更時，應即以書面通知他方。如因拒收或無法送達而遭退回二次者，以最後退件日推定已依本契約受通知。雙方仍宜以簡訊、電子郵件或其他通訊軟體同步告知他方。</p>

<h2>第十三條：爭議處理</h2>
<p>因本契約發生之爭議，雙方本於誠信原則協議解決。如雙方無法達成共識，得於直轄市、縣（市）政府消費爭議調解委員會、鄉（鎮、市、區）公所調解委員會或法院調解，或以標的物所在地之法院為第一審管轄法院（不排除消費者保護法及民事訴訟法小額訴訟管轄法院之適用），亦得依仲裁法規定進行仲裁。</p>

<h2>第十四條：消費者資訊之利用</h2>
<p>乙方僅得於履行本契約之目的範圍內（如聯絡、發包、現場勘測等）蒐集、處理及利用甲方之個人資料。非經甲方同意或法律另有規定外，乙方不得將甲方個資外洩或提供予無關之第三人。</p>

<h2>第十五條：保密協議</h2>
<p>甲乙雙方保證，凡因本契約之簽訂及履行而知悉對方之商業秘密、個人隱私或未公開之設計構想，絕不外洩予任何第三方。如有違反，違約方應賠償受損害方因此所生之一切損害。</p>

<h2>第十六條：附件效力與契約分存</h2>
<p>1. 本契約之附件（如設計費用估價單、變更設計同意書等）及雙方後續補充之書面協議，均為本契約之一部分，具同等法律效力。</p>
<p>2. 本契約正本一式貳份，由甲、乙雙方各執一份為憑，並自雙方簽署日起生效。</p>

<h2>第十七條：未盡事宜之處置</h2>
<p>本契約有未盡事宜者，依中華民國相關法令、平等互惠與誠實信用原則，由雙方另行協議補充之。</p>

function HB_generateEstimateExcel(v){
  let rows=[];
  rows.push(["赫柏空間設計 工程估價單"]);
  rows.push(["客戶名稱",v.clientName||"","聯絡人",v.contactName||""]);
  rows.push(["工程名稱",v.engName||"","施工地點",v.siteAddress||""]);
  rows.push(["日期",v.quoteDate||""]);
  rows.push([]);
  let headerRowIdx=rows.length;
  rows.push(["項次","項目","規格","單位","數量","單價","複價","備註"]);
  let no=0;
  let subtotalRowRefs=[];
  (v.categories||[]).forEach(cat=>{
    let items=(cat.items||[]).filter(it=>it.name||it.spec||HB_num(it.price));
    if(items.length===0)return;
    rows.push([cat.name||"（未命名分類）"]);
    let firstDataRow=rows.length+1;
    items.forEach(it=>{
      no++;
      let rIdx=rows.length+1;
      rows.push([no,it.name||"",it.spec||"",it.unit||"",HB_num(it.qty)||"",it.price!==""?HB_num(it.price):"",{f:`E${rIdx}*F${rIdx}`},it.note||""]);
    });
    let lastDataRow=rows.length;
    rows.push(["","","","","","小計",{f:`SUM(G${firstDataRow}:G${lastDataRow})`},""]);
    subtotalRowRefs.push(rows.length);
  });
  let grandRow=rows.length+1;
  let sumFormula=subtotalRowRefs.length?subtotalRowRefs.map(r=>`G${r}`).join("+"):0;
  rows.push(["","","","","","總價(未含營業稅5%)",subtotalRowRefs.length?{f:sumFormula}:0,""]);
  rows.push([]);
  rows.push(["1. 本估價單有效期限 "+(v.validDays||"5")+" 天。"]);
  rows.push(["2. "+(v.depositNote||"如蒙惠顧請先付訂金3成，或雙方議定金額。")]);
  rows.push(["3. 估價單內容若經合約簽訂，則以其繕打內容及材料為主，若須變更則需雙方議定之。"]);
  rows.push([]);
  rows.push(["業主簽章：","","公司名稱：赫柏空間設計"]);
  rows.push(["","","連絡電話：0987583978"]);
  rows.push(["","","統一編號：00351070"]);
  rows.push(["","","公司地址：嘉義市新民路168號"]);
  let ws=window.XLSX.utils.aoa_to_sheet(rows);
  ws["!cols"]=[{wch:6},{wch:22},{wch:16},{wch:8},{wch:8},{wch:12},{wch:14},{wch:20}];
  let wb=window.XLSX.utils.book_new();
  window.XLSX.utils.book_append_sheet(wb,ws,"估價單");
  let out=window.XLSX.write(wb,{bookType:"xlsx",type:"array"});
  HB_downloadBlob(new Blob([out],{type:"application/vnd.openxmlformats-officedocument.spreadsheetml.sheet"}),(v.engName||"工程估價單")+"_赫柏空間估價單.xlsx");
}
